<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6c5ce7">
<meta name="description" content="爆旋陀螺X 個人收藏管理與全球圖鑑">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="陀螺收藏">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/parts/gear-3-80.png">
<title>🌀 爆旋陀螺X 收藏庫</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f0f23;
    color: #e0e0e0;
    line-height: 1.6;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header {
    text-align: center; padding: 30px 20px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-radius: 16px; margin-bottom: 24px;
    border: 1px solid #2a2a4a;
  }
  header h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
  header p { color: #888; font-size: 0.95rem; }
  .stats-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: #1a1a2e; border-radius: 12px; padding: 16px;
    text-align: center; border: 1px solid #2a2a4a;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: #4a4a6a; }
  .stat-card .num { font-size: 1.8rem; font-weight: bold; color: #6c5ce7; }
  .stat-card .label { font-size: 0.85rem; color: #888; margin-top: 4px; }

  .tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
    background: #1a1a2e; padding: 6px; border-radius: 12px;
    border: 1px solid #2a2a4a;
  }
  .tab {
    flex: 1; padding: 12px; text-align: center; cursor: pointer;
    border-radius: 8px; font-weight: 500; transition: all 0.2s;
    background: transparent; color: #888; border: none;
  }
  .tab.active { background: #6c5ce7; color: white; }
  .tab:hover:not(.active) { background: #2a2a4a; color: #ccc; }

  .search-box {
    width: 100%; padding: 14px 18px; border-radius: 12px;
    border: 1px solid #2a2a4a; background: #1a1a2e; color: #e0e0e0;
    font-size: 1rem; margin-bottom: 16px; outline: none;
  }
  .search-box:focus { border-color: #6c5ce7; }

  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .filter-chip {
    padding: 8px 16px; border-radius: 20px; border: 1px solid #2a2a4a;
    background: #1a1a2e; color: #888; cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .filter-chip:hover, .filter-chip.active {
    background: #6c5ce7; color: white; border-color: #6c5ce7;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: #1a1a2e; border-radius: 16px; padding: 20px;
    border: 1px solid #2a2a4a; transition: all 0.2s; cursor: pointer;
    position: relative;
  }
  .card img {
    position: relative; z-index: 1;
  }
  .card:hover {
    transform: translateY(-3px); border-color: #4a4a6a;
    box-shadow: 0 8px 32px rgba(108,92,231,0.15);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    z-index: 2; pointer-events: none;
    border-radius: 16px 16px 0 0;
  }
  .card.T0::before { background: linear-gradient(90deg, #ff6b6b, #feca57); }
  .card.T1::before { background: linear-gradient(90deg, #feca57, #48dbfb); }
  .card.T2::before { background: linear-gradient(90deg, #48dbfb, #1dd1a1); }
  .card.T3::before { background: linear-gradient(90deg, #8395a7, #576574); }

  /* Owned cards: hide top bar, use left green border instead */
  .card.owned { border-left: 4px solid #1dd1a1; }
  .card.owned::before {
    display: none !important;
    height: 0 !important;
    visibility: hidden;
  }

  .card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px;
  }
  .card-id { font-size: 0.8rem; color: #6c5ce7; font-weight: bold; }
  .card-tier {
    padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold;
  }
  .tier-T0 { background: rgba(255,107,107,0.2); color: #ff6b6b; }
  .tier-T1 { background: rgba(254,202,87,0.2); color: #feca57; }
  .tier-T2 { background: rgba(72,219,251,0.2); color: #48dbfb; }
  .tier-T3 { background: rgba(131,149,167,0.2); color: #8395a7; }

  .card-name { font-size: 1.15rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
  .card-name-jp { font-size: 0.8rem; color: #666; margin-bottom: 12px; }

  .specs {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    font-size: 0.85rem;
  }
  .spec { display: flex; justify-content: space-between; }
  .spec-label { color: #666; }
  .spec-value { color: #ccc; font-weight: 500; }

  .badge-owned {
    position: absolute; top: 12px; right: 12px;
    background: #1dd1a1; color: #0f0f23;
    padding: 4px 10px; border-radius: 12px;
    font-weight: 700; font-size: 0.75rem; letter-spacing: 0.02em;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .buy-score {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
  }
  .dot { width: 20px; height: 20px; border-radius: 50%; }
  .dot.on { background: #1dd1a1; }
  .dot.off { background: #2a2a4a; }

  /* Personal collection tier display */
  .tier-display {
    margin-top: 12px; font-size: 0.8rem; font-weight: 600;
    color: #feca57; text-align: center;
  }

  /* Owned card footer: badge + tier side by side */
  .owned-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #2a2a4a;
  }
  .owned-tag {
    background: #1dd1a1; color: #0f0f23;
    padding: 4px 10px; border-radius: 12px;
    font-weight: 700; font-size: 0.75rem;
  }
  .tier-inline {
    font-size: 0.8rem; font-weight: 600; padding: 2px 8px; border-radius: 8px;
  }
  .tier-inline.tier-T0 { background: rgba(255,107,107,0.2); color: #ff6b6b; }
  .tier-inline.tier-T0\.5 { background: rgba(255,107,107,0.15); color: #ff8787; }
  .tier-inline.tier-T1 { background: rgba(116,185,255,0.2); color: #74b9ff; }
  .tier-inline.tier-T2 { background: rgba(254,202,87,0.2); color: #feca57; }
  .tier-inline.tier-T3 { background: rgba(130,130,130,0.2); color: #a0a0a0; }

  /* Buy score: dots + tier label */
  .buy-score { display: flex; flex-direction: row; align-items: center; gap: 6px; margin-top: 12px; }
  .buy-score-label { font-size: 0.75rem; color: #888; margin-left: 4px; }

  .detail-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
    padding: 20px;
  }
  .detail-modal.show { display: flex; }
  .modal-content {
    background: #1a1a2e; border-radius: 20px; padding: 32px;
    max-width: 500px; width: 100%; border: 1px solid #2a2a4a;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-close {
    float: right; font-size: 1.5rem; color: #888; cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: #fff; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #666;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

  .refresh-btn {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: #6c5ce7; color: white; border: none;
    font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 16px rgba(108,92,231,0.4);
    transition: all 0.2s; z-index: 100;
  }
  .refresh-btn:hover { transform: scale(1.1); }
  .refresh-btn.spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .section-title {
    font-size: 1.1rem; color: #fff; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.5rem; }
    .tabs { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🌀 爆旋陀螺X 收藏庫</h1>
    <p> Beyblade X Collection Manager • 實時數據同步</p>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">全球款式</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statOwned">0</div>
      <div class="label">已收藏</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statT0">0</div>
      <div class="label">🔥 T0 必買</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statT1">0</div>
      <div class="label">⭐ T1 優先</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('personal')">📦 我的收藏</button>
    <button class="tab" onclick="switchTab('global')">🌍 全球圖鑑</button>
    <button class="tab" onclick="switchTab('tier')">🏆 評級榜</button>
    <button class="tab" onclick="switchTab('combos')">🏅 冠軍組合</button>
    <button class="tab" onclick="switchTab('parts')">🔩 零件圖鑑</button>
  </div>

  <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜尋名稱、編號、類型..." oninput="doSearch()">

  <div class="filters" id="tierFilters" style="display:none">
    <span class="filter-chip active" onclick="filterTier('all')">全部</span>
    <span class="filter-chip" onclick="filterTier('T0')">🔥 T0 必買</span>
    <span class="filter-chip" onclick="filterTier('T1')">⭐ T1 優先</span>
    <span class="filter-chip" onclick="filterTier('T2')">📌 T2 可考慮</span>
    <span class="filter-chip" onclick="filterTier('T3')">💤 T3 收藏</span>
  </div>

  <div class="filters" id="typeFilters" style="display:none">
    <span class="filter-chip active" onclick="filterType('all')">全部</span>
    <span class="filter-chip" onclick="filterType('攻擊型')">⚔️ 攻擊</span>
    <span class="filter-chip" onclick="filterType('防禦型')">🛡️ 防禦</span>
    <span class="filter-chip" onclick="filterType('持久型')">💫 持久</span>
    <span class="filter-chip" onclick="filterType('平衡型')">⚖️ 平衡</span>
  </div>

  <div id="content"></div>
</div>

<div class="detail-modal" id="detailModal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<button class="refresh-btn" id="refreshBtn" onclick="refreshData()" title="刷新數據">↻</button>

<script>
let personalData = {tops: []};
let globalData = {tops: []};
let combosData = {meta_combos: [], world_champion: null};
let partsData = {ratchets: [], bits: []};
let currentTab = 'personal';
let currentFilter = 'all';

async function loadData() {
  try {
    const [pRes, gRes, cRes, ptRes] = await Promise.all([
      fetch('/api/personal').catch(() => ({json: () => ({tops: []})})),
      fetch('/api/global').catch(() => ({json: () => ({tops: []})})),
      fetch('/api/combos').catch(() => ({json: () => ({meta_combos: [], world_champion: null})})),
      fetch('/api/parts').catch(() => ({json: () => ({ratchets: [], bits: []})}))
    ]);
    personalData = await pRes.json();
    globalData = await gRes.json();
    combosData = await cRes.json();
    partsData = await ptRes.json();
    updateStats();
    render();
  } catch (e) {
    console.error('Load failed:', e);
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>無法載入數據，請確認服務器運行中</p>
        <p style="font-size:0.8rem;margin-top:8px;color:#666">錯誤: ${e.message}</p>
      </div>`;
  }
}

function updateStats() {
  const g = globalData.tops || [];
  const p = personalData.tops || [];
  document.getElementById('statTotal').textContent = g.length;
  document.getElementById('statOwned').textContent = p.length;
  document.getElementById('statT0').textContent = g.filter(t => t.tier === 'T0').length;
  document.getElementById('statT1').textContent = g.filter(t => t.tier === 'T1').length;
}

function getOwnedCodes() {
  return new Set((personalData.tops || []).map(t => t.id));
}

function getBuyScore(tier) {
  const map = {'T0': 5, 'T1': 4, 'T2': 3, 'T3': 2};
  return map[tier] || 2;
}

function renderBuyScore(tier) {
  const score = getBuyScore(tier);
  const tierLabels = {'T0': '必買', 'T0.5': '推薦', 'T1': '建議', 'T2': '可考慮', 'T3': '非必要'};
  const dots = Array(5).fill(0).map((_,i) =>
    `<div class="dot ${i < score ? 'on' : 'off'}" style="width:16px;height:16px;border-radius:50%;flex-shrink:0"></div>`
  ).join('');
  const label = tierLabels[tier] || '普通';
  return `<div style="display:flex;flex-direction:row;align-items:center;gap:4px">${dots}<span style="font-size:0.75rem;color:#888;margin-left:4px">${label} ${tier}</span></div>`;
}

function renderCard(t, isPersonal) {
  const owned = getOwnedCodes();
  const isOwned = owned.has(t.code || t.id);
  const tier = t.tier || 'T3';
  const code = t.code || t.id;
  const name = t.name_hk || t.name_en || 'Unknown';
  const nameEn = t.name_en || '';
  const nameJp = t.name_jp || '';
  const lock = t.lock || '—';
  const axis = t.axis || '?';
  const axisType = t.axis_type || '';
  const spin = t.spin || '右';
  const type = t.type || '?';

  const img = t.image ? `<img src="${t.image}" alt="${name}" style="width:100%;max-height:120px;object-fit:contain;margin-bottom:12px;border-radius:8px;">` : '';
  return `
    <div class="card ${tier}${isOwned ? ' owned' : ''}" onclick="showDetail('${code}', ${isPersonal})">
      <div class="card-header">
        <span class="card-id">${code}</span>
        <span class="card-tier tier-${tier}">${tier}</span>
      </div>
      ${img}
      <div class="card-name">${name}</div>
      ${nameJp ? `<div class="card-name-jp">${nameJp}</div>` : ''}
      <div class="specs">
        <div class="spec"><span class="spec-label">🔒 固鎖</span><span class="spec-value">${lock}</span></div>
        <div class="spec"><span class="spec-label">⚙️ 中軸</span><span class="spec-value">${axis}${axisType ? ` (${axisType})` : ''}</span></div>
        <div class="spec"><span class="spec-label">🔄 迴旋</span><span class="spec-value">${spin}</span></div>
        <div class="spec"><span class="spec-label">📂 類型</span><span class="spec-value">${type}</span></div>
      </div>
      ${isOwned
        ? `<div class="owned-footer"><span class="owned-tag">✓ 已擁有</span><span class="tier-inline tier-${tier}">📊 ${tier}</span></div>`
        : `<div class="buy-score">${renderBuyScore(tier)}</div>`
      }
    </div>
  `;
}

function render() {
  const el = document.getElementById('content');
  const search = document.getElementById('searchBox').value.toLowerCase();
  const owned = getOwnedCodes();

  let items = [];
  if (currentTab === 'personal') {
    items = (personalData.tops || []).filter(t => {
      if (!search) return true;
      const text = JSON.stringify(t).toLowerCase();
      return text.includes(search);
    });
    if (items.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>暫無收藏</p><p style="font-size:0.85rem;color:#666;margin-top:8px">去「全球圖鑑」添加陀螺吧！</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="section-title">📦 我的收藏 (${items.length}款)</div>
      <div class="grid">${items.map(t => renderCard(t, true)).join('')}</div>
    `;
  } else if (currentTab === 'global') {
    items = (globalData.tops || []).filter(t => {
      if (currentFilter !== 'all' && t.type !== currentFilter) return false;
      if (!search) return true;
      const text = JSON.stringify(t).toLowerCase();
      return text.includes(search);
    });
    if (items.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>無匹配結果</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="section-title">🌍 全球圖鑑 (${items.length}/${globalData.tops?.length || 0}款)</div>
      <div class="grid">${items.map(t => renderCard(t, false)).join('')}</div>
    `;
  } else if (currentTab === 'combos') {
    renderCombos();
  } else if (currentTab === 'parts') {
    renderParts();
  } else if (currentTab === 'tier') {
    items = (globalData.tops || []).filter(t => {
      if (currentFilter !== 'all' && t.tier !== currentFilter) return false;
      if (!search) return true;
      const text = JSON.stringify(t).toLowerCase();
      return text.includes(search);
    }).sort((a, b) => {
      const tierOrder = {'T0': 0, 'T1': 1, 'T2': 2, 'T3': 3};
      return (tierOrder[a.tier] || 4) - (tierOrder[b.tier] || 4);
    });
    if (items.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🏆</div><p>無此評級陀螺</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="section-title">🏆 評級榜 (${items.length}款)</div>
      <div class="grid">${items.map(t => renderCard(t, false)).join('')}</div>
    `;
  }
}

function switchTab(tab) {
  currentTab = tab;
  currentFilter = 'all';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('tierFilters').style.display = tab === 'tier' ? 'flex' : 'none';
  document.getElementById('typeFilters').style.display = tab === 'global' ? 'flex' : 'none';

  // Reset filter chips
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.filter-chip').forEach(c => {
    if (c.textContent.includes('全部')) c.classList.add('active');
  });

  render();
}

function renderParts() {
  const el = document.getElementById('content');
  
  let html = '<div style="margin-bottom:24px">';
  
  // Recommended combos section FIRST
  if (partsData.recommended_combos && partsData.recommended_combos.length > 0) {
    html += '<div class="section-title">🏆 推薦組合（你現有的零件）</div>';
    html += '<div class="grid">';
    for (const c of partsData.recommended_combos) {
      const tierColor = c.rating >= 130 ? '#ff6b6b' : c.rating >= 100 ? '#feca57' : '#48dbfb';
      html += `<div class="card" style="cursor:default;border:1px solid ${tierColor}33">`;
      html += `<div class="card-header"><span class="card-name">${c.name}</span><span class="card-tier" style="background:${tierColor}22;color:${tierColor}">評分 ${c.rating}</span></div>`;
      html += `<div style="margin-top:12px;padding:12px;background:#0f0f23;border-radius:8px">`;
      html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">`;
      html += `<div><div style="color:#888;font-size:0.7rem">刃片</div><div style="color:#6c5ce7;font-weight:bold">${c.blade}</div><div style="color:#666;font-size:0.7rem">${c.blade_source}</div></div>`;
      html += `<div><div style="color:#888;font-size:0.7rem">齒輪</div><div style="color:#feca57;font-weight:bold">${c.ratchet}</div><div style="color:#666;font-size:0.7rem">${c.ratchet_source}</div></div>`;
      html += `<div><div style="color:#888;font-size:0.7rem">中軸</div><div style="color:#48dbfb;font-weight:bold">${c.bit}</div><div style="color:#666;font-size:0.7rem">${c.bit_source}</div></div>`;
      html += `</div></div>`;
      html += `<div style="font-size:0.8rem;color:#888;margin-top:8px">${c.description}</div>`;
      html += '</div>';
    }
    html += '</div></div>';
  }
  
  // Ratchets section
  html += '<div class="section-title" style="margin-top:24px">⚙️ 齒輪 (Ratchet)</div>';
  html += '<div class="grid">';
  for (const r of partsData.ratchets) {
    html += `<div class="card" style="cursor:default">`;
    html += `<div style="text-align:center;margin-bottom:12px;background:#0f0f23;border-radius:12px;padding:16px">`;

    html += `<img src="${b.image}" style="max-width:100px;max-height:180px;object-fit:contain" onerror="this.parentElement.innerHTML='<div style=color:#666>圖片載入失敗</div>'">`;

    html += `<div class="card-header"><span class="card-name">${b.code}</span><span class="card-tier">中軸</span></div>`;
    html += `<div class="specs" style="margin-top:8px">`;

    html += `<div class="spec"><span class="spec-label">類型</span><span class="spec-value">${b.type}</span></div>`;

    {type: '⏱️ 持久型', combo: '9-65齒輪 + B(球)中軸', best: '時鐘幽景(原裝)'},

function renderCombos() {
  const el = document.getElementById('content');
  const search = document.getElementById('searchBox').value.toLowerCase();
  const owned = getOwnedCodes();

  let html = '';

  // Combo Builder section
  html += `<div style="background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #6c5ce7;margin-bottom:24px">
    <div style="color:#6c5ce7;font-weight:bold;font-size:1rem;margin-bottom:16px">🔧 配搭選擇器</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div>
        <div style="color:#888;font-size:0.8rem;margin-bottom:6px">刃片 (Blade)</div>
        <select id="comboBlade" onchange="updateCombo()" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#0f0f23;color:#e0e0e0;font-size:0.9rem">
          <option value="">選擇刃片...</option>
          ${(globalData.tops||[]).slice(0,20).map(t=>`<option value="${t.code||t.id}">${t.code||t.id} ${t.name_hk||t.name_en||''}</option>`).join('')}
        </select>
      </div>
      <div>
        <div style="color:#888;font-size:0.8rem;margin-bottom:6px">齒輪 (Ratchet)</div>
        <select id="comboRatchet" onchange="updateCombo()" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#0f0f23;color:#e0e0e0;font-size:0.9rem">
          <option value="">選擇齒輪...</option>
          ${(partsData.ratchets||[]).map(r=>`<option value="${r.code}">${r.code} ${r.name}</option>`).join('')}
        </select>
      </div>
      <div>
        <div style="color:#888;font-size:0.8rem;margin-bottom:6px">中軸 (Bit)</div>
        <select id="comboBit" onchange="updateCombo()" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#0f0f23;color:#e0e0e0;font-size:0.9rem">
          <option value="">選擇中軸...</option>
          ${(partsData.bits||[]).map(b=>`<option value="${b.code}">${b.code} ${b.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div id="comboPreview" style="text-align:center;padding:16px;background:#0f0f23;border-radius:8px;min-height:60px">
      <div style="color:#666;font-size:0.9rem">選擇零件組合成你的陀螺</div>
    </div>
  </div>`;

  // World Champion section
  const wc = combosData.world_champion;
  if (wc && wc.gold) {
    html += '<div style="margin-bottom:24px">';
    html += '<div class="section-title">🏆 2025 世界冠軍組合</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">';
    const medals = [['gold', '🥇'], ['silver', '🥈'], ['bronze', '🥉']];
    for (const [key, medal] of medals) {
      const p = wc[key];
      if (!p) continue;
      html += `<div style="background:#1a1a2e;border-radius:12px;padding:16px;text-align:center;border:1px solid #2a2a4a">`;
      html += `<div style="font-size:1.5rem;margin-bottom:4px">${medal}</div>`;
      html += `<div style="color:#fff;font-weight:bold;font-size:0.9rem">${p.player}</div>`;
      html += `<div style="color:#666;font-size:0.75rem">`;
      for (const combo of p.deck || []) {
        html += `<div style="margin-top:4px">${combo.blade} ${combo.ratchet}${combo.bit}</div>`;
      }
      html += `</div></div>`;
    }
    html += '</div></div>';
  }

  // Meta combos section
  const filtered = (combosData.meta_combos || []).filter(c => {
    if (!search) return true;
    return JSON.stringify(c).toLowerCase().includes(search);
  });

  if (filtered.length > 0) {
    html += '<div style="margin-bottom:24px">';
    html += '<div class="section-title">⚡ 2025 Meta 強勢組合</div>';
    html += '<div class="grid">';
    for (const c of filtered) {
      const tierColor = c.tier === 'S+' ? '#ff6b6b' : c.tier === 'S' ? '#feca57' : '#48dbfb';
      html += `<div class="card" style="cursor:default">`;
      html += `<div class="card-header"><span class="card-name">${c.name}</span>`;
      html += `<span class="card-tier" style="background:rgba(255,107,107,0.2);color:${tierColor}">${c.tier}</span></div>`;
      html += `<div class="specs" style="margin-top:8px">`;
      html += `<div class="spec"><span class="spec-label">刃片</span><span class="spec-value">${c.blade}</span></div>`;
      html += `<div class="spec"><span class="spec-label">拉契特</span><span class="spec-value">${c.ratchet}</span></div>`;
      html += `<div class="spec"><span class="spec-label">中軸</span><span class="spec-value">${c.bit}</span></div>`;
      html += `</div>`;
      html += `<div style="font-size:0.8rem;color:#888;margin-top:8px">${c.note}</div>`;
      html += `</div>`;
    }
    html += '</div></div>';
  }

  // Key parts section
  const bits = combosData.world_champion?.key_parts?.bits || {};
  if (Object.keys(bits).length > 0) {
    html += '<div style="margin-bottom:24px">';
    html += '<div class="section-title">🔧 關鍵配件攻略</div>';
    for (const [bit, desc] of Object.entries(bits)) {
      html += `<div style="background:#1a1a2e;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid #2a2a4a">`;
      html += `<span style="color:#6c5ce7;font-weight:bold">${bit}</span>`;
      html += `<span style="color:#888;margin-left:8px">${desc}</span>`;
      html += `</div>`;
    }
    html += '</div>';
  }

  if (!html) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🏅</div><p>暫無冠軍組合資料</p></div>';
    return;
  }

  el.innerHTML = html;
}

function updateCombo() {
  const blade = document.getElementById('comboBlade')?.value;
  const ratchet = document.getElementById('comboRatchet')?.value;
  const bit = document.getElementById('comboBit')?.value;
  const preview = document.getElementById('comboPreview');
  if (!preview) return;

  if (!blade && !ratchet && !bit) {
    preview.innerHTML = '<div style="color:#666;font-size:0.9rem">選擇零件組合成你的陀螺</div>';
    return;
  }

  const bladeData = blade ? (globalData.tops||[]).find(t=>(t.code||t.id)===blade) : null;
  const ratchetData = ratchet ? (partsData.ratchets||[]).find(r=>r.code===ratchet) : null;
  const bitData = bit ? (partsData.bits||[]).find(b=>b.code===bit) : null;

  let html = '<div style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap">';
  if (bladeData) {
    const img = bladeData.image ? `<img src="${bladeData.image}" style="width:60px;height:60px;object-fit:contain">` : '';
    html += `<div style="text-align:center">${img}<div style="color:#6c5ce7;font-size:0.75rem">${bladeData.code||blade}</div><div style="color:#fff;font-size:0.8rem">${bladeData.name_hk||bladeData.name_en||''}</div></div>`;
    html += '<div style="color:#666;font-size:1.5rem">+</div>';
  }
  if (ratchetData) {
    const img = ratchetData.image ? `<img src="${ratchetData.image}" style="width:60px;height:60px;object-fit:contain">` : '';
    html += `<div style="text-align:center">${img}<div style="color:#feca57;font-size:0.75rem">${ratchetData.code}</div></div>`;
    html += '<div style="color:#666;font-size:1.5rem">+</div>';
  }
  if (bitData) {
    const img = bitData.image ? `<img src="${bitData.image}" style="width:60px;height:60px;object-fit:contain">` : '';
    html += `<div style="text-align:center">${img}<div style="color:#48dbfb;font-size:0.75rem">${bitData.code}</div></div>`;
  }
  html += '</div>';

  if (blade && ratchet && bit) {
    html += `<div style="margin-top:12px;text-align:center"><button onclick="saveCombo()" style="padding:8px 20px;background:#1dd1a1;color:#0f0f23;border:none;border-radius:8px;cursor:pointer;font-weight:bold">💾 保存組合</button></div>`;
  }

  preview.innerHTML = html;
}

async function saveCombo() {
  const blade = document.getElementById('comboBlade')?.value;
  const ratchet = document.getElementById('comboRatchet')?.value;
  const bit = document.getElementById('comboBit')?.value;
  alert(`組合已保存！\n刃片: ${blade}\n齒輪: ${ratchet}\n中軸: ${bit}`);
}

function filterTier(tier) {
  currentFilter = tier;
  document.querySelectorAll('#tierFilters .filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function filterType(type) {
  currentFilter = type;
  document.querySelectorAll('#typeFilters .filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function doSearch() {
  render();
}

function showDetail(code, isPersonal) {
  const data = isPersonal ? personalData : globalData;
  const t = (data.tops || []).find(x => (x.code || x.id) === code);
  if (!t) return;

  const owned = getOwnedCodes();
  const isOwned = owned.has(code);
  const tier = t.tier || 'T3';
  const score = getBuyScore(tier);
  const scoreLabels = {5: '🔥 必買', 4: '⭐ 推薦', 3: '📌 可考慮', 2: '💤 謹慎'};

  let reasons = '';
  if (tier === 'T0') reasons = '✅ meta最強級，競技場必備<br>✅ 保值/升值潛力高<br>✅ 市場需求極大';
  else if (tier === 'T1') reasons = '✅ 高競爭力，可與T0抗衡<br>✅ 實戰性能優秀<br>✅ CP值高';
  else if (tier === 'T2') reasons = '✅ 穩定可用<br>⚠️ 非meta主流，收藏為主<br>💡 如果你係fans或者收集系列可以買';
  else reasons = '⚠️ 非競技向<br>💡 收藏用為主';

  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      ${t.image ? `<img src="${t.image}" alt="${name}" style="width:150px;max-height:150px;object-fit:contain;margin-bottom:12px;border-radius:12px;">` : ''}
      <div style="font-size:0.9rem;color:#6c5ce7;font-weight:bold">${code}</div>
      <h2 style="color:#fff;margin:8px 0">${t.name_hk || t.name_en || 'Unknown'}</h2>
      ${t.name_jp ? `<div style="color:#666;font-size:0.9rem">${t.name_jp}</div>` : ''}
      ${isOwned ? '<span style="display:inline-block;margin-top:8px;padding:4px 12px;background:#1dd1a1;color:#0f0f23;border-radius:12px;font-size:0.8rem;font-weight:bold">✓ 已擁有</span>' : ''}
    </div>

    <div style="background:#0f0f23;border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="color:#888">推薦指數</span>
        <span style="font-weight:bold;color:#${score >= 4 ? '1dd1a1' : score >= 3 ? 'feca57' : '8395a7'}">${scoreLabels[score]} ${score}/5</span>
      </div>
      ${renderBuyScore(tier)}
    </div>

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px">
      <div style="background:#0f0f23;border-radius:12px;padding:12px">
        <div style="color:#666;font-size:0.8rem">🔒 固鎖</div>
        <div style="color:#fff;font-weight:bold;font-size:1.1rem">${t.lock || '—'}</div>
      </div>
      <div style="background:#0f0f23;border-radius:12px;padding:12px">
        <div style="color:#666;font-size:0.8rem">⚙️ 中軸</div>
        <div style="color:#fff;font-weight:bold;font-size:1.1rem">${t.axis || '?'}${t.axis_type ? ` <span style="font-size:0.8rem;color:#888">(${t.axis_type})</span>` : ''}</div>
      </div>
      <div style="background:#0f0f23;border-radius:12px;padding:12px">
        <div style="color:#666;font-size:0.8rem">🔄 迴旋</div>
        <div style="color:#fff;font-weight:bold;font-size:1.1rem">${t.spin === 'L' ? '左' : t.spin === 'R' ? '右' : t.spin || '右'}</div>
      </div>
      <div style="background:#0f0f23;border-radius:12px;padding:12px">
        <div style="color:#666;font-size:0.8rem">📂 類型</div>
        <div style="color:#fff;font-weight:bold;font-size:1.1rem">${t.type || '?'}</div>
      </div>
    </div>

    ${t.meta || t.characteristics ? `
    <div style="background:#0f0f23;border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="color:#666;font-size:0.8rem;margin-bottom:8px">📝 評價</div>
      <div style="color:#ccc;font-size:0.9rem;line-height:1.6">${t.meta || t.characteristics}</div>
    </div>
    ` : ''}

    <div style="background:#0f0f23;border-radius:12px;padding:16px">
      <div style="color:#666;font-size:0.8rem;margin-bottom:8px">💰 購買分析</div>
      <div style="color:#ccc;font-size:0.9rem;line-height:1.6">${reasons}</div>
    </div>

    ${t.release ? `
    <div style="margin-top:16px;text-align:center;color:#666;font-size:0.8rem">
      📅 發售: ${t.release}${t.price ? ` | ¥${t.price}` : ''}
    </div>
    ` : ''}

    <div style="margin-top:20px;text-align:center">
      ${isOwned
        ? `<button onclick="removeFromCollection('${code}')" style="padding:12px 24px;background:#ff6b6b;color:#fff;border:none;border-radius:12px;font-size:1rem;cursor:pointer;font-weight:bold">✕ 移除收藏</button>`
        : `<button onclick="addToCollection('${code}')" style="padding:12px 24px;background:#1dd1a1;color:#0f0f23;border:none;border-radius:12px;font-size:1rem;cursor:pointer;font-weight:bold">✓ 加入收藏</button>`
      }
    </div>
  `;
  document.getElementById('detailModal').classList.add('show');
}

async function addToCollection(code) {
  const t = globalData.tops.find(x => (x.code || x.id) === code);
  if (!t) return;
  try {
    const res = await fetch('/api/personal/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(t)
    });
    const result = await res.json();
    if (result.ok) {
      await refreshData();
      showDetail(code, false);
    }
  } catch(e) { console.error(e); }
}

async function removeFromCollection(code) {
  try {
    const res = await fetch('/api/personal/remove', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code})
    });
    const result = await res.json();
    if (result.ok) {
      await refreshData();
      showDetail(code, false);
    }
  } catch(e) { console.error(e); }
}

function closeModal(e) {
  if (!e || e.target.id === 'detailModal' || e.target.className === 'modal-close') {
    document.getElementById('detailModal').classList.remove('show');
  }
}

function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  loadData().then(() => {
    setTimeout(() => btn.classList.remove('spin'), 500);
  });
}

// Auto refresh every 30 seconds
setInterval(loadData, 30000);

// Service Worker registration for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then((reg) => console.log('SW registered:', reg.scope))
      .catch((err) => console.log('SW registration failed:', err));
  });
}

// Initial load
loadData();
