<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6c5ce7">
<meta name="description" content="爆旋陀螺X 個人收藏管理與全球圖鑑">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="陀螺收藏">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-512.png">
<title>🌀 爆旋陀螺X 收藏庫</title>
<link rel="stylesheet" href="css/styles.css?v=3.0">
</head>
<body>

<!-- Header -->
<header style="background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:16px 20px;position:sticky;top:0;z-index:100">
  <div style="display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto">
    <h1 style="font-size:1.2rem;font-weight:700;color:#6c5ce7">🌀 爆旋陀螺X 收藏庫</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="display:flex;gap:8px;font-size:0.7rem;color:#888">
        <span>📦 <span id="statTotal">0</span></span>
        <span>⭐ <span id="statOwned">0</span></span>
        <span>🔥 T0:<span id="statT0">0</span></span>
        <span>T1:<span id="statT1">0</span></span>
      </div>
      <button id="refreshBtn" onclick="refreshData()" style="background:none;border:none;color:#6c5ce7;font-size:1.2rem;cursor:pointer;padding:4px;border-radius:8px">🔄</button>
    </div>
  </div>
</header>

<!-- Search -->
<div style="max-width:900px;margin:16px auto;padding:0 20px">
  <input id="searchBox" type="text" placeholder="🔍 搜尋陀螺名稱、型號..." onkeyup="doSearch()" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:0.95rem;outline:none">
</div>

<!-- Tabs -->
<div style="max-width:900px;margin:0 auto;padding:0 20px;display:flex;gap:4px;border-bottom:1px solid #2a2a4a">
  <button class="tab active" onclick="switchTab('personal')">📦 我的收藏</button>
  <button class="tab" onclick="switchTab('global')">🌍 全球圖鑑</button>
  <button class="tab" onclick="switchTab('tier')">🏆 評級榜</button>
  <button class="tab" onclick="switchTab('combos')">🔧 配搭</button>
  <button class="tab" onclick="switchTab('parts')">⚙️ 零件</button>
  <button class="tab" onclick="location.href='daily.html'">📰 資訊</button>
</div>

<!-- Tier Filter -->
<div id="tierFilters" style="display:none;max-width:900px;margin:12px auto;padding:0 20px;flex-wrap:wrap;gap:8px">
  <button class="filter-chip active" onclick="filterTier('all', event)">全部</button>
  <button class="filter-chip" onclick="filterTier('T0', event)">🔥 T0</button>
  <button class="filter-chip" onclick="filterTier('T1', event)">⭐ T1</button>
  <button class="filter-chip" onclick="filterTier('T2', event)">📌 T2</button>
  <button class="filter-chip" onclick="filterTier('T3', event)">💤 T3</button>
</div>

<!-- Type Filter -->
<div id="typeFilters" style="display:none;max-width:900px;margin:12px auto;padding:0 20px;flex-wrap:wrap;gap:8px">
  <button class="filter-chip active" onclick="filterType('all', event)">全部</button>
  <button class="filter-chip" onclick="filterType('攻擊型', event)">⚔️ 攻擊型</button>
  <button class="filter-chip" onclick="filterType('防禦型', event)">🛡️ 防禦型</button>
  <button class="filter-chip" onclick="filterType('持久型', event)">⏱️ 持久型</button>
  <button class="filter-chip" onclick="filterType('平衡型', event)">⚖️ 平衡型</button>
</div>

<!-- Main Content -->
<main id="content" style="max-width:900px;margin:20px auto;padding:0 20px;min-height:50vh"></main>

<!-- Detail Modal -->
<div id="detailModal" onclick="closeModal(event)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#1a1a2e;border-radius:16px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative;border:1px solid #2a2a4a">
    <button class="modal-close" onclick="closeModal(event)" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:1.2rem;cursor:pointer">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Scripts -->
<script>
// Force clear all service worker caches and reload
if ('serviceWorker' in navigator) {
  caches.keys().then(function(names) {
    return Promise.all(names.map(function(n) { return caches.delete(n); }));
  }).then(function() {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
  });
}
</script>
<script src="js/supabase_client.js?v=3.0"></script>
<script src="js/app.js?v=3.0"></script>

<footer style="text-align:center;padding:24px 20px;color:#444;font-size:0.75rem;line-height:1.8">
  <div>© 2026 Beyblade X 收藏庫 — 個人工具</div>
  <div style="margin-top:4px">
    產品圖片版權屬 Takara Tomy 所有 |
    數據來源：Beyblade Fandom Wiki
  </div>
</footer>

</body>
</html>
