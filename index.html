<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6c5ce7">
<meta name="description" content="爆旋陀螺X 個人收藏管理與全球圖鑑">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="陀螺收藏">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-512.png">
<title>🌀 爆旋陀螺X 收藏庫</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Header -->
<header>
  <div>
    <h1>🌀 爆旋陀螺X 收藏庫</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="refreshBtn" onclick="refreshData()" style="background:none;border:1px solid #2a2a4a;color:#6c5ce7;font-size:0.85rem;cursor:pointer;padding:5px 10px;border-radius:8px" title="刷新數據">🔄</button>
      <button onclick="exportCollection()" style="background:none;border:1px solid #2a2a4a;color:#1dd1a1;font-size:0.85rem;cursor:pointer;padding:5px 10px;border-radius:8px" title="導出備份">📤</button>
      <button onclick="triggerImport()" style="background:none;border:1px solid #2a2a4a;color:#feca57;font-size:0.85rem;cursor:pointer;padding:5px 10px;border-radius:8px" title="導入備份">📥</button>
    </div>
  </div>
</header>

<!-- Stats Bar (below header) -->
<div style="max-width:900px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;gap:16px;overflow-x:auto;white-space:nowrap;flex-wrap:wrap">
  <span style="font-size:0.78rem;color:#a0a0c0">📦 <span style="color:#e8e8f0;font-weight:700;font-size:0.95rem" id="statTotal">0</span></span>
  <span style="font-size:0.78rem;color:#a0a0c0">⭐ <span style="color:#e8e8f0;font-weight:700;font-size:0.95rem" id="statOwned">0</span></span>
  <span style="font-size:0.78rem;color:#ff6b6b">🔥 T0 <span style="font-weight:700;font-size:0.95rem" id="statT0">0</span></span>
  <span style="font-size:0.78rem;color:#feca57">⭐ T1 <span style="font-weight:700;font-size:0.95rem" id="statT1">0</span></span>
</div>

<!-- PWA Install Banner -->
<div id="pwaBanner" style="max-width:900px;margin:0 auto;padding:10px 16px;display:flex;align-items:flex-start;gap:10px;background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.3);border-radius:10px;margin-top:8px;font-size:0.78rem;color:#a0a0c0;line-height:1.5">
  <span style="font-size:1.1rem;flex-shrink:0;margin-top:1px">💡</span>
  <div style="flex:1">
    <div style="font-weight:600;color:#c8c0f0;margin-bottom:3px">可將本工具安裝為 App</div>
    <div><strong>iOS</strong>：Safari 分享按鈕 →「加入主畫面」｜<strong>Android</strong>：Chrome 右上角⋮ →「安裝應用程式」</div>
  </div>
  <button onclick="dismissBanner('pwa')" style="background:none;border:none;color:#6c5ce7;font-size:0.9rem;cursor:pointer;padding:2px 6px;flex-shrink:0;align-self:flex-start">✕</button>
</div>

<!-- Backup Tip Banner -->
<div id="backupBanner" style="max-width:900px;margin:0 auto;padding:10px 16px;display:flex;align-items:flex-start;gap:10px;background:rgba(29,209,161,0.08);border:1px solid rgba(29,209,161,0.25);border-radius:10px;margin-top:8px;font-size:0.78rem;color:#a0a0c0;line-height:1.5">
  <span style="font-size:1.1rem;flex-shrink:0;margin-top:1px">📌</span>
  <div style="flex:1">
    <div style="font-weight:600;color:#7de8cc;margin-bottom:3px">定期備份收藏</div>
    <div>header 右邊 📤 導出 JSON 檔案到本地 → 📥 可隨時恢復，換機/清除數據都不怕</div>
  </div>
  <button onclick="dismissBanner('backup')" style="background:none;border:none;color:#1dd1a1;font-size:0.9rem;cursor:pointer;padding:2px 6px;flex-shrink:0;align-self:flex-start">✕</button>
</div>

<!-- Search -->
<div style="max-width:900px;margin:0 auto;padding:10px 16px 8px">
  <input id="searchBox" type="text" placeholder="🔍 搜尋陀螺名稱、型號..." onkeyup="doSearch()" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:0.95rem;outline:none">
</div>

<!-- Tabs -->
<div style="max-width:900px;margin:0 auto;padding:0 20px;display:flex;gap:4px;border-bottom:1px solid #2a2a4a">
  <button class="tab active" onclick="switchTab('personal')">📦 我的收藏</button>
  <button class="tab" onclick="switchTab('global')">🌍 全球圖鑑</button>
  <button class="tab" onclick="switchTab('tier')">🏆 評級榜</button>
  <button class="tab" onclick="switchTab('combos')">🔧 配搭</button>
  <button class="tab" onclick="switchTab('parts')">⚙️ 零件</button>
</div>

<!-- Tier Filter -->
<div id="tierFilters" style="display:none;max-width:900px;margin:12px auto;padding:0 20px;flex-wrap:wrap;gap:8px">
  <button class="filter-chip active" onclick="filterTier('all', event)">全部</button>
  <button class="filter-chip" onclick="filterTier('T0', event)">🔥 T0</button>
  <button class="filter-chip" onclick="filterTier('T1', event)">⭐ T1</button>
  <button class="filter-chip" onclick="filterTier('T2', event)">📌 T2</button>
  <button class="filter-chip" onclick="filterTier('T3', event)">💤 T3</button>
</div>

<!-- Type Filter -->
<div id="typeFilters" style="display:none;max-width:900px;margin:12px auto;padding:0 20px;flex-wrap:wrap;gap:8px">
  <button class="filter-chip active" onclick="filterType('all', event)">全部</button>
  <button class="filter-chip" onclick="filterType('攻擊型', event)">⚔️ 攻擊型</button>
  <button class="filter-chip" onclick="filterType('防禦型', event)">🛡️ 防禦型</button>
  <button class="filter-chip" onclick="filterType('持久型', event)">⏱️ 持久型</button>
  <button class="filter-chip" onclick="filterType('平衡型', event)">⚖️ 平衡型</button>
</div>

<!-- Main Content -->
<main id="content" style="max-width:900px;margin:20px auto;padding:0 20px;min-height:50vh"></main>

<!-- Detail Modal -->
<div id="detailModal" onclick="closeModal(event)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#1a1a2e;border-radius:16px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative;border:1px solid #2a2a4a">
    <button class="modal-close" onclick="closeModal(event)" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:1.2rem;cursor:pointer">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Scripts -->
<script src="js/supabase_client.js"></script>
<script src="js/app.js"></script>

<footer style="text-align:center;padding:24px 20px;color:#444;font-size:0.75rem;line-height:1.8">
  <div>© 2026 Beyblade X 收藏庫 — 個人工具</div>
  <div style="margin-top:4px">
    產品圖片版權屬 Takara Tomy 所有 |
    數據來源：Beyblade Fandom Wiki
  </div>
</footer>

</body>
</html>
